
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 16px; font-family: var(--font-sans);">
<div style="max-width: 320px; margin: 0 auto; background: var(--color-background-primary); border-radius: 24px; border: 0.5px solid var(--color-border-secondary); overflow: hidden; position: relative;">

  <div style="padding: 10px 20px 4px; display: flex; justify-content: space-between;">
    <span style="font-size: 11px; font-weight: 500; color: var(--color-text-primary);">9:41</span>
    <span style="font-size: 11px; color: var(--color-text-secondary);">●●●</span>
  </div>

  <div style="padding: 6px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--color-border-tertiary);">
    <div>
      <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 2px;">
        <div style="width: 7px; height: 7px; border-radius: 50%; background: #A32D2D;"></div>
        <p style="font-size: 14px; font-weight: 500; margin: 0; color: var(--color-text-primary);">Intervalles 400m ×6</p>
      </div>
      <p style="font-size: 11px; color: var(--color-text-secondary); margin: 0;">ML, KD · Rép. 3 / 6</p>
    </div>
    <button style="background: #FCEBEB; border: 0.5px solid #F09595; border-radius: var(--border-radius-md); padding: 5px 12px; font-size: 11px; color: #A32D2D; cursor: pointer;">Terminer</button>
  </div>

  <!-- Contenu flouté -->
  <div style="padding: 12px 16px 20px; filter: blur(1.5px); opacity: 0.35; pointer-events: none;">
    <div style="display: flex; gap: 4px; margin-bottom: 14px;">
      <div style="flex: 1; height: 5px; border-radius: 3px; background: #534AB7;"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: #534AB7;"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: #534AB7;"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: var(--color-border-secondary);"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: var(--color-border-secondary);"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: var(--color-border-secondary);"></div>
    </div>
    <div style="text-align: center; margin-bottom: 16px;">
      <p style="font-size: 48px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 12px; line-height: 1;">01:44.1</p>
      <div style="display: flex; gap: 8px;">
        <div style="flex: 1; height: 38px; background: #534AB7; border-radius: 8px;"></div>
        <div style="width: 44px; height: 38px; background: var(--color-background-secondary); border-radius: 8px;"></div>
      </div>
    </div>
    <div style="display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-bottom: 14px;">
      <div style="height: 90px; background: #EEEDFE; border-radius: 12px; border: 1.5px solid #534AB7;"></div>
      <div style="height: 90px; background: var(--color-background-secondary); border-radius: 12px;"></div>
    </div>
    <div style="height: 130px; background: var(--color-background-secondary); border-radius: 12px;"></div>
  </div>

  <!-- Overlay -->
  <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.25); border-radius: 24px;"></div>

  <!-- Bottom sheet -->
  <div style="position: absolute; bottom: 0; left: 0; right: 0; background: var(--color-background-primary); border-radius: 20px 20px 24px 24px; padding: 0 0 20px; box-shadow: 0 -4px 24px rgba(0,0,0,0.15);">
    <div style="display: flex; justify-content: center; padding: 10px 0 6px;">
      <div style="width: 36px; height: 4px; background: var(--color-border-secondary); border-radius: 2px;"></div>
    </div>
    <div style="padding: 4px 20px 0;">

      <!-- Infos split sélectionné -->
      <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px;">
        <div style="width: 32px; height: 32px; border-radius: 50%; background: #EEEDFE; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #534AB7; flex-shrink: 0;">ML</div>
        <div>
          <p style="font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0;">Rép. 2 · Marie-Luce D.</p>
          <p style="font-size: 11px; color: var(--color-text-secondary); margin: 2px 0 0;">Temps enregistré : 59.7s</p>
        </div>
      </div>

      <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 10px;">Que veux-tu faire avec ce split ?</p>

      <button style="width: 100%; padding: 11px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; font-size: 12px; color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
        <div style="width: 30px; height: 30px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: #0F6E56; flex-shrink: 0;">KD</div>
        <div style="text-align: left;">
          <p style="font-size: 12px; font-weight: 500; color: var(--color-text-primary); margin: 0;">Switcher vers Kevin D.</p>
          <p style="font-size: 10px; color: var(--color-text-secondary); margin: 0;">Assigner 59.7s à KD · retirer de ML</p>
        </div>
        <i class="ti ti-switch-2" style="font-size: 16px; color: #534AB7; margin-left: auto;" aria-hidden="true"></i>
      </button>

      <button style="width: 100%; padding: 11px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; font-size: 12px; color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
        <div style="width: 30px; height: 30px; border-radius: 50%; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i class="ti ti-edit" style="font-size: 15px; color: var(--color-text-secondary);" aria-hidden="true"></i>
        </div>
        <div style="text-align: left;">
          <p style="font-size: 12px; font-weight: 500; color: var(--color-text-primary); margin: 0;">Modifier le temps</p>
          <p style="font-size: 10px; color: var(--color-text-secondary); margin: 0;">Entrer un temps manuellement</p>
        </div>
        <i class="ti ti-chevron-right" style="font-size: 16px; color: var(--color-text-tertiary); margin-left: auto;" aria-hidden="true"></i>
      </button>

      <button style="width: 100%; padding: 11px 12px; border: 0.5px solid #F09595; border-radius: var(--border-radius-md); background: #FCEBEB; font-size: 12px; color: #A32D2D; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <div style="width: 30px; height: 30px; border-radius: 50%; background: #F7C1C1; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i class="ti ti-trash" style="font-size: 15px; color: #A32D2D;" aria-hidden="true"></i>
        </div>
        <div style="text-align: left;">
          <p style="font-size: 12px; font-weight: 500; color: #A32D2D; margin: 0;">Supprimer ce split</p>
          <p style="font-size: 10px; color: #A32D2D; margin: 0; opacity: 0.7;">Cette action est irréversible</p>
        </div>
      </button>

      <button style="width: 100%; padding: 10px; border: none; background: transparent; font-size: 13px; color: var(--color-text-secondary); cursor: pointer;">Annuler</button>
    </div>
  </div>

</div>
</div>
