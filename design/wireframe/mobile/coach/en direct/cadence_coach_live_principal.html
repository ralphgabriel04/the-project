
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 16px; font-family: var(--font-sans);">
<div style="max-width: 320px; margin: 0 auto; background: var(--color-background-primary); border-radius: 24px; border: 0.5px solid var(--color-border-secondary); overflow: hidden;">

  <div style="padding: 10px 20px 4px; display: flex; justify-content: space-between;">
    <span style="font-size: 11px; font-weight: 500; color: var(--color-text-primary);">9:41</span>
    <span style="font-size: 11px; color: var(--color-text-secondary);">●●●</span>
  </div>

  <div style="padding: 6px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--color-border-tertiary);">
    <div>
      <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 2px;">
        <div style="width: 7px; height: 7px; border-radius: 50%; background: #A32D2D;"></div>
        <p style="font-size: 14px; font-weight: 500; margin: 0; color: var(--color-text-primary);">Intervalles 400m ×6</p>
      </div>
      <p style="font-size: 11px; color: var(--color-text-secondary); margin: 0;">ML, KD · Rép. 3 / 6</p>
    </div>
    <button style="background: #FCEBEB; border: 0.5px solid #F09595; border-radius: var(--border-radius-md); padding: 5px 12px; font-size: 11px; color: #A32D2D; cursor: pointer;">Terminer</button>
  </div>

  <div style="padding: 12px 16px 20px;">

    <!-- Progression -->
    <div style="display: flex; gap: 4px; margin-bottom: 14px;">
      <div style="flex: 1; height: 5px; border-radius: 3px; background: #534AB7;"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: #534AB7;"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: #534AB7;"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: var(--color-border-secondary);"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: var(--color-border-secondary);"></div>
      <div style="flex: 1; height: 5px; border-radius: 3px; background: var(--color-border-secondary);"></div>
    </div>

    <!-- Chrono -->
    <div style="text-align: center; margin-bottom: 16px;">
      <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 4px; text-transform: uppercase; letter-spacing: 0.05em;">Chrono · Rép. 3</p>
      <p style="font-size: 48px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 12px; font-variant-numeric: tabular-nums; letter-spacing: -2px; line-height: 1;">01:42.3</p>
      <div style="display: flex; gap: 8px; justify-content: center;">
        <button style="flex: 1; padding: 10px; background: #534AB7; border: none; border-radius: var(--border-radius-md); font-size: 12px; font-weight: 500; color: #EEEDFE; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;">
          <i class="ti ti-player-pause" style="font-size: 14px;" aria-hidden="true"></i> Pause
        </button>
        <button style="padding: 10px 14px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 12px; color: var(--color-text-secondary); cursor: pointer;">
          <i class="ti ti-refresh" style="font-size: 15px;" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <!-- Boutons split par athlète -->
    <p style="font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 8px;">Capturer un split — tap sur l'athlète</p>
    <div style="display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-bottom: 16px;">
      <button style="background: #EEEDFE; border: 1.5px solid #534AB7; border-radius: var(--border-radius-lg); padding: 14px 12px; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px;">
        <div style="width: 36px; height: 36px; border-radius: 50%; background: #534AB7; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #EEEDFE;">ML</div>
        <p style="font-size: 13px; font-weight: 500; color: #3C3489; margin: 0;">Marie-Luce</p>
        <div style="background: #CECBF6; border-radius: var(--border-radius-md); padding: 3px 10px;">
          <p style="font-size: 11px; color: #3C3489; margin: 0;">Meilleur : 58.2s</p>
        </div>
      </button>
      <button style="background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 14px 12px; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px;">
        <div style="width: 36px; height: 36px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #0F6E56;">KD</div>
        <p style="font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0;">Kevin</p>
        <div style="background: var(--color-background-primary); border-radius: var(--border-radius-md); padding: 3px 10px;">
          <p style="font-size: 11px; color: var(--color-text-secondary); margin: 0;">Meilleur : 59.3s</p>
        </div>
      </button>
    </div>

    <!-- Tableau splits -->
    <p style="font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 8px;">Splits</p>
    <div style="border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 8px;">
      <div style="display: grid; grid-template-columns: 50px 1fr 1fr 1fr; padding: 6px 12px; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary);">
        <span style="font-size: 10px; color: var(--color-text-tertiary);">Rép.</span>
        <span style="font-size: 10px; color: var(--color-text-tertiary); text-align: center;">ML</span>
        <span style="font-size: 10px; color: var(--color-text-tertiary); text-align: center;">KD</span>
        <span style="font-size: 10px; color: var(--color-text-tertiary); text-align: center;">Écart</span>
      </div>
      <div style="display: grid; grid-template-columns: 50px 1fr 1fr 1fr; padding: 8px 12px; border-bottom: 0.5px solid var(--color-border-tertiary);">
        <span style="font-size: 12px; color: var(--color-text-secondary);">1</span>
        <span style="font-size: 13px; font-weight: 500; color: #3B6D11; text-align: center;">58.2s</span>
        <span style="font-size: 13px; font-weight: 500; color: var(--color-text-primary); text-align: center;">60.1s</span>
        <span style="font-size: 11px; color: var(--color-text-secondary); text-align: center;">+1.9s</span>
      </div>
      <div style="display: grid; grid-template-columns: 50px 1fr 1fr 1fr; padding: 8px 12px; border-bottom: 0.5px solid var(--color-border-tertiary);">
        <span style="font-size: 12px; color: var(--color-text-secondary);">2</span>
        <span style="font-size: 13px; font-weight: 500; color: var(--color-text-primary); text-align: center;">59.7s</span>
        <span style="font-size: 13px; font-weight: 500; color: #3B6D11; text-align: center;">59.3s</span>
        <span style="font-size: 11px; color: var(--color-text-secondary); text-align: center;">+0.4s</span>
      </div>
      <div style="display: grid; grid-template-columns: 50px 1fr 1fr 1fr; padding: 8px 12px; background: #EEEDFE;">
        <span style="font-size: 12px; color: #534AB7;">3</span>
        <span style="font-size: 13px; color: #534AB7; text-align: center;">—</span>
        <span style="font-size: 13px; color: #534AB7; text-align: center;">—</span>
        <span style="font-size: 11px; color: #534AB7; text-align: center;">—</span>
      </div>
    </div>
    <p style="font-size: 10px; color: var(--color-text-tertiary); text-align: center; margin: 0;">Appui long sur un split pour modifier ou switcher</p>

  </div>
</div>
</div>
