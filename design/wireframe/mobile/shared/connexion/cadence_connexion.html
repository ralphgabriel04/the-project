<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cadence — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>body{margin:0;background:#1a1a1a;}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../../design-canvas.jsx"></script>
<script type="text/babel" src="../../cadence-kit.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function LinkText({ children, align }) {
  return <a style={{ color: 'var(--accent)', fontSize: 13, fontWeight: 700, textDecoration: 'none',
    alignSelf: align, cursor: 'pointer' }}>{children}</a>;
}

function Connexion({ theme, state = 'idle' }) {
  return (
    <Screen theme={theme} height={844}>
      <StatusBar />
      <div style={{ padding: `0 ${PX}px`, display: 'flex', flexDirection: 'column', height: 797 }}>
        {/* brand block — upper third */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 64, paddingBottom: 44 }}>
          <Logo size={72} />
          <div style={{ fontSize: 24, fontWeight: 700, letterSpacing: '-0.03em', marginTop: 16 }}>Cadence</div>
          <div style={{ fontSize: 13, fontWeight: 400, fontStyle: 'italic', color: 'var(--text-sub)', marginTop: 4 }}>Entraîne ton rythme</div>
        </div>

        {/* form */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Field label="Courriel" placeholder="felix@exemple.com"
                 value={state !== 'idle' ? 'felix@exemple.com' : ''}
                 state={state === 'focus' ? 'focus' : 'idle'} />
          <Field label="Mot de passe" placeholder="••••••••"
                 value={state === 'error' ? '••••••' : ''}
                 state={state === 'error' ? 'error' : 'idle'}
                 message={state === 'error' ? 'Courriel ou mot de passe incorrect.' : undefined}
                 trailing={<span style={{ color: 'var(--text-muted)', display: 'flex', cursor: 'pointer' }}><Icon.eye /></span>} />
          <LinkText align="flex-end">Mot de passe oublié ?</LinkText>
        </div>

        <div style={{ marginTop: 22 }}>
          <Btn variant="primary" height={56}>Se connecter</Btn>
        </div>

        <div style={{ margin: '24px 0' }}><OrDivider /></div>

        <Btn variant="ghost" height={52} icon={<Icon.apple />}>Continuer avec Apple</Btn>

        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', justifyContent: 'center', gap: 6, paddingBottom: 24 }}>
          <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-sub)' }}>Pas encore de compte ?</span>
          <LinkText>Créer un compte</LinkText>
        </div>
      </div>
    </Screen>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="signal" title="Signal — Dark mode" subtitle="Connexion · flux modal (pas de bottom nav)">
        <DCArtboard id="s-idle"  label="Repos"          width={390} height={844}><Connexion theme="signal" state="idle" /></DCArtboard>
        <DCArtboard id="s-focus" label="Focus courriel" width={390} height={844}><Connexion theme="signal" state="focus" /></DCArtboard>
        <DCArtboard id="s-err"   label="Erreur"         width={390} height={844}><Connexion theme="signal" state="error" /></DCArtboard>
      </DCSection>
      <DCSection id="pulse" title="Pulse — Light mode" subtitle="Bouton primaire = noir, texte blanc">
        <DCArtboard id="p-idle"  label="Repos"          width={390} height={844}><Connexion theme="pulse" state="idle" /></DCArtboard>
        <DCArtboard id="p-focus" label="Focus courriel" width={390} height={844}><Connexion theme="pulse" state="focus" /></DCArtboard>
        <DCArtboard id="p-err"   label="Erreur"         width={390} height={844}><Connexion theme="pulse" state="error" /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
