<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cadence — Profil</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>body{margin:0;background:#1a1a1a;}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../../design-canvas.jsx"></script>
<script type="text/babel" src="../../cadence-kit.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function StatCell({ value, label, accent, mono = true, divider }) {
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
      borderLeft: divider ? '1px solid var(--border)' : 'none' }}>
      <span className={mono ? 'mono' : ''} style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em',
        color: accent ? 'var(--accent)' : 'var(--text)' }}>{value}</span>
      <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-sub)' }}>{label}</span>
    </div>
  );
}
function InfoRow({ label, value, last }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 48,
      padding: '0 16px', borderBottom: last ? 'none' : '1px solid var(--border)' }}>
      <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-sub)' }}>{label}</span>
      <span style={{ fontSize: 14, fontWeight: 600 }}>{value}</span>
    </div>
  );
}

function Profil({ theme, role = 'athlete' }) {
  const ath = role === 'athlete';
  return (
    <Screen theme={theme} height={900} scroll>
      <StatusBar />
      <TopBar title="Profil" onBack={false} right={<button style={{ width: 36, height: 36, border: 'none', background: 'transparent', color: 'var(--text-sub)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}><Icon.settings /></button>} />

      <div style={{ padding: `4px ${PX}px 100px`, display: 'flex', flexDirection: 'column', gap: 16 }}>
        {/* identity */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, paddingTop: 6 }}>
          <Avatar initials={ath ? 'FL' : 'AX'} size={84} ring />
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.03em' }}>{ath ? 'Félix Lavoie' : 'Alexandre Côté'}</div>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginTop: 8 }}>
              <Pill accent>{ath ? 'Athlète' : 'Coach'}</Pill>
              <Pill>{ath ? 'Aviron · Intermédiaire' : 'Force · Endurance'}</Pill>
            </div>
          </div>
        </div>

        {/* stats band */}
        <Card pad={0}>
          <div style={{ display: 'flex', padding: '16px 0' }}>
            {ath ? (
              <>
                <StatCell value="83 %" label="Compliance" accent />
                <StatCell value="14" label="Séances" divider />
                <StatCell value="5" label="PRs" accent divider />
              </>
            ) : (
              <>
                <StatCell value="12" label="Athlètes" accent />
                <StatCell value="3" label="Groupes" divider />
                <StatCell value="6" label="Programmes" accent divider />
              </>
            )}
          </div>
        </Card>

        {/* infos */}
        <div>
          <SectionLabel style={{ marginBottom: 10 }}>Infos personnelles</SectionLabel>
          <Card pad={0}>
            <InfoRow label="Nom" value={ath ? 'Félix Lavoie' : 'Alexandre Côté'} />
            <InfoRow label="Courriel" value={ath ? 'felix@exemple.com' : 'alex@exemple.com'} />
            <InfoRow label="Membre depuis" value="Janv. 2025" last />
          </Card>
        </div>

        {/* coach link OR invite code */}
        <div>
          <SectionLabel style={{ marginBottom: 10 }}>{ath ? 'Coach lié' : 'Code d\u2019invitation'}</SectionLabel>
          {ath ? (
            <Card stripe>
              <div style={{ display: 'flex', alignItems: 'center', gap: 13, paddingLeft: 6 }}>
                <Avatar initials="AX" size={44} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>Alexandre Côté</div>
                  <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-sub)', marginTop: 2 }}>Coach · depuis janv. 2025</div>
                </div>
                <span style={{ color: 'var(--text-muted)', display: 'flex' }}><Icon.chevron /></span>
              </div>
            </Card>
          ) : (
            <Card>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <div>
                  <div className="mono" style={{ fontSize: 22, fontWeight: 500, letterSpacing: '0.12em', color: 'var(--accent)' }}>CAD-9X4K</div>
                  <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-sub)', marginTop: 4 }}>Partage ce code pour inviter un athlète.</div>
                </div>
                <button style={{ width: 40, height: 40, borderRadius: 10, border: '1px solid var(--border)', background: 'var(--surface2)', color: 'var(--text-sub)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}><Icon.copy /></button>
              </div>
            </Card>
          )}
        </div>

        {/* actions */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginTop: 4 }}>
          <Btn variant="secondary" height={52} icon={<Icon.edit width={18} />}>Modifier le profil</Btn>
          <SettingsGroup>
            <SettingsRow icon={<Icon.settings />} label="Réglages" last />
          </SettingsGroup>
          <Btn variant="ghost" height={52}>Se déconnecter</Btn>
        </div>
      </div>

      <NavBar role={role} active="Profil" />
    </Screen>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="signal" title="Signal — Dark mode" subtitle="Profil · vue identité (≠ réglages) · bottom nav · Profil actif">
        <DCArtboard id="s-ath"   label="Athlète" width={390} height={900}><Profil theme="signal" role="athlete" /></DCArtboard>
        <DCArtboard id="s-coach" label="Coach"   width={390} height={900}><Profil theme="signal" role="coach" /></DCArtboard>
      </DCSection>
      <DCSection id="pulse" title="Pulse — Light mode">
        <DCArtboard id="p-ath"   label="Athlète" width={390} height={900}><Profil theme="pulse" role="athlete" /></DCArtboard>
        <DCArtboard id="p-coach" label="Coach"   width={390} height={900}><Profil theme="pulse" role="coach" /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
